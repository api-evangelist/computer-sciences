description: >-
  Computer Sciences Corporation (CSC) was a multinational information
  technology services and professional services company. On April 1, 2017,
  CSC merged with the Enterprise Services line of business of Hewlett
  Packard Enterprise to form DXC Technology, retiring the standalone CSC
  brand. This profile is preserved as a historical record; CSC did not
  publish any public developer APIs and the entity is no longer actively
  operated under this name.
